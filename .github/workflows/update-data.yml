name: Update Portfolio Data

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & update portfolio data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cat > /tmp/update-data.js << 'SCRIPT'
          const GITHUB_USER = 'Wayhhow';
          const PORTFOLIO_REPO = 'wayhhow.github.io';
          const GH_TOKEN = process.env.GH_TOKEN;

          async function fetchJSON(url, retries = 2) {
            for (let attempt = 1; attempt <= retries + 1; attempt++) {
              try {
                const headers = { Accept: 'application/vnd.github+json' };
                if (GH_TOKEN) headers.Authorization = `Bearer ${GH_TOKEN}`;
                const res = await fetch(url, { headers });
                if (res.ok) return await res.json();
                if (res.status === 403 || res.status === 429) {
                  console.warn(`Rate limited on ${url} (attempt ${attempt}/${retries + 1}), waiting 2s...`);
                  await new Promise(r => setTimeout(r, 2000));
                  continue;
                }
                if (attempt > 1) console.warn(`fetch ${url} failed with ${res.status} after ${attempt - 1} retries`);
                return null;
              } catch (e) {
                if (attempt <= retries) {
                  console.warn(`fetch ${url} error (attempt ${attempt}/${retries + 1}): ${e.message}`);
                  await new Promise(r => setTimeout(r, 1500));
                  continue;
                }
                console.error(`fetch ${url} failed after ${retries} retries: ${e.message}`);
                return null;
              }
            }
          }

          async function getAllRepos() {
            let page = 1, all = [];
            while (true) {
              const repos = await fetchJSON(
                `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&page=${page}&sort=updated`
              );
              if (!repos || !repos.length) break;
              all = all.concat(repos);
              if (repos.length < 100) break;
              page++;
            }
            return all;
          }

          async function fetchContribData() {
            try {
              const res = await fetch(`https://github-contributions-api.jogruber.de/v4/${GITHUB_USER}`, {
                headers: GH_TOKEN ? { Authorization: `Bearer ${GH_TOKEN}` } : {},
                signal: AbortSignal.timeout(10000),
              });
              if (res.ok) {
                const data = await res.json();
                const contrib = {};
                if (data.contributions) {
                  data.contributions.forEach(c => {
                    contrib[c.date] = c.count;
                  });
                }
                // Data completeness check
                const oneYearAgo = new Date();
                oneYearAgo.setDate(oneYearAgo.getDate() - 365);
                const cutoffYear = oneYearAgo.getFullYear();
                const cutoffMonth = String(oneYearAgo.getMonth() + 1).padStart(2, '0');
                const cutoffDay = String(oneYearAgo.getDate()).padStart(2, '0');
                const cutoffDate = `${cutoffYear}-${cutoffMonth}-${cutoffDay}`;
                const recentDays = Object.keys(contrib).filter(d => d >= cutoffDate).length;
                console.log(`Primary API returned ${recentDays} days of contribution data`);
                if (recentDays < 300) {
                  console.warn('Primary API data appears incomplete (< 300 days), falling back to GraphQL');
                  return {};
                }
                return contrib;
              }
            } catch (e) {
              console.warn('Primary contribution API failed:', e.message);
            }

            if (!GH_TOKEN) return {};
            console.log('Falling back to GitHub GraphQL API for contributions...');
            try {
              const from = new Date();
              from.setDate(from.getDate() - 365);
              const gqlRes = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: { Authorization: `Bearer ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  query: `query($login: String!, $from: DateTime!, $to: DateTime!) {
                    user(login: $login) {
                      contributionsCollection(from: $from, to: $to) {
                        contributionCalendar { weeks { contributionDays { date contributionCount } } }
                      }
                    }
                  }`,
                  variables: { login: GITHUB_USER, from: from.toISOString(), to: new Date().toISOString() },
                }),
              });
              if (!gqlRes.ok) return {};
              const gqlData = await gqlRes.json();
              const contrib = {};
              const weeks = gqlData?.data?.user?.contributionsCollection?.contributionCalendar?.weeks || [];
              weeks.forEach(w => w.contributionDays.forEach(d => { contrib[d.date] = d.contributionCount; }));
              return contrib;
            } catch (e) {
              console.warn('GraphQL fallback also failed:', e.message);
              return {};
            }
          }

          (async () => {
            const [user, allRepos, contribData] = await Promise.all([
              fetchJSON(`https://api.github.com/users/${GITHUB_USER}`),
              getAllRepos(),
              fetchContribData(),
            ]);

            const starred = allRepos.filter(r => !r.fork && r.stargazers_count > 0)
              .sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0));
            const starredNames = new Set(starred.map(r => r.name));
            const latest = allRepos.filter(r => !r.fork && !starredNames.has(r.name))
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));
            const featured = [...starred, ...latest].slice(0, 6);
            const nonForkRepos = allRepos.filter(r => !r.fork && r.name !== PORTFOLIO_REPO);
            const totalStars = nonForkRepos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
            const publicRepos = user.public_repos;

            const langTotals = {}, langCounts = {};
            let grand = 0;
            for (const repo of nonForkRepos) {
              const langs = await fetchJSON(repo.languages_url);
              if (!langs) continue;
              Object.entries(langs).forEach(([lang, bytes]) => {
                langTotals[lang] = (langTotals[lang] || 0) + bytes;
                langCounts[lang] = (langCounts[lang] || 0) + 1;
                grand += bytes;
              });
            }
            const langStats = Object.entries(langTotals)
              .sort((a, b) => b[1] - a[1])
              .filter(([, bytes]) => bytes / grand * 100 >= 0.5)
              .slice(0, 6)
              .map(([name, bytes]) => ({ name, count: langCounts[name], pct: Math.round(bytes / grand * 100) }));
            const pctSum = langStats.reduce((s, l) => s + l.pct, 0);
            if (pctSum !== 100 && langStats.length > 0) {
              const diff = 100 - pctSum;
              langStats[0].pct += diff;
            }

            const now = new Date();
            const updated = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const contribTotal = Object.values(contribData).reduce((s, n) => s + n, 0);
            console.log(`Updated: ${updated} | Stars: ${totalStars} | Repos: ${publicRepos} | Featured: ${featured.length} | Contribs: ${contribTotal}`);

            const projectsArr = featured.map(r => ({
              name: r.name,
              desc: r.description || `${r.name} — a ${r.language || 'code'} project by ${GITHUB_USER}`,
              lang: r.language || 'Code',
              stars: r.stargazers_count || 0,
              url: r.html_url,
              topics: (r.topics || []).slice(0, 3),
            }));

            const oneYearAgo = new Date();
            oneYearAgo.setDate(oneYearAgo.getDate() - 365);
            const cutoffDate = `${oneYearAgo.getFullYear()}-${String(oneYearAgo.getMonth()+1).padStart(2,'0')}-${String(oneYearAgo.getDate()).padStart(2,'0')}`;
            const filteredContrib = {};
            Object.entries(contribData)
              .filter(([date]) => date >= cutoffDate && date <= updated)
              .sort(([a], [b]) => a.localeCompare(b))
              .forEach(([date, count]) => { filteredContrib[date] = count; });

            const fs = require('fs');
            const dataJson = {
              updated_at: updated,
              user: {
                login: user.login || GITHUB_USER,
                name: user.name || 'Weihao Wu',
                public_repos: publicRepos,
                followers: user.followers || 0,
                following: user.following || 0,
                public_gists: user.public_gists || 0,
              },
              stats: {
                total_stars: totalStars,
                public_repos: publicRepos,
                languages_count: langStats.length,
                achievements: 1,
              },
              lang_stats: langStats,
              contributions: filteredContrib,
              projects: projectsArr,
            };
            // Validate data before writing
            if (Object.keys(filteredContrib).length === 0 && Object.keys(contribData).length > 0) {
              console.warn('Filtered contributions is empty but raw data exists - date range may be wrong');
            }
            if (Object.keys(filteredContrib).length === 0) {
              console.warn('WARNING: No contribution data available, keeping existing data.json contributions');
              // Read existing data.json and preserve its contributions
              try {
                const existing = JSON.parse(fs.readFileSync('data.json', 'utf8'));
                if (existing.contributions && Object.keys(existing.contributions).length > 0) {
                  dataJson.contributions = existing.contributions;
                  console.log('Preserved existing contribution data');
                }
              } catch (e) { /* no existing file */ }
            }
            fs.writeFileSync('data.json', JSON.stringify(dataJson, null, 2));
            console.log('data.json written');
            console.log(`Contributions: ${Object.keys(filteredContrib).length} days, ${contribTotal} total`);
            console.log(`Languages: ${langStats.map(l => l.name + ' ' + l.pct + '%').join(', ')}`);
            console.log(`Projects: ${projectsArr.map(p => p.name).join(', ')}`);
            console.log(`Stats: ${totalStars} stars, ${publicRepos} repos | Contribs: ${contribTotal} | Featured: ${featured.length} repos`);
          })();
          SCRIPT
          node /tmp/update-data.js

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "ci: auto-update portfolio data $(date -u +%Y-%m-%d)"
          git push
