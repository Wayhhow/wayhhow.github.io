name: Update Portfolio Data

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & update portfolio data
        run: node << 'EOF'
        const GITHUB_USER = 'Wayhhow';
        const PORTFOLIO_REPO = 'wayhhow.github.io';
        const LANG_COLORS = {
          JavaScript: { bg: 'rgba(247,223,30,0.12)', color: '#f7df1e', dot: '#f7df1e' },
          Python: { bg: 'rgba(53,114,165,0.12)', color: '#6fa3cc', dot: '#6fa3cc' },
          Java: { bg: 'rgba(176,114,25,0.12)', color: '#e8a84c', dot: '#e8a84c' },
          HTML: { bg: 'rgba(227,76,38,0.12)', color: '#e34c26', dot: '#e34c26' },
          CSS: { bg: 'rgba(38,77,228,0.12)', color: '#6d9dec', dot: '#6d9dec' },
          Verilog: { bg: 'rgba(113,120,112,0.12)', color: '#9ca8a0', dot: '#9ca8a0' },
        };

        async function fetchJSON(url) {
          const res = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });
          if (!res.ok) return null;
          return res.json();
        }

        async function getAllRepos() {
          let page = 1, all = [];
          while (true) {
            const repos = await fetchJSON(
              `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&page=${page}&sort=updated`
            );
            if (!repos || !repos.length) break;
            all = all.concat(repos.filter(r => !r.fork && r.name !== PORTFOLIO_REPO));
            if (repos.length < 100) break;
            page++;
          }
          return all;
        }

        async function fetchContribData() {
          const res = await fetch(`https://github.com/users/${GITHUB_USER}/contributions`, {
            headers: { 'Accept': 'text/html' }
          });
          if (!res.ok) return {};
          const html = await res.text();
          const contrib = {};
          const re = /data-date="(\d{4}-\d{2}-\d{2})"\s+data-count="(\d+)"/g;
          let m;
          while ((m = re.exec(html)) !== null) {
            contrib[m[1]] = parseInt(m[2], 10);
          }
          return contrib;
        }

        (async () => {
          const [user, allRepos, contribData] = await Promise.all([
            fetchJSON(`https://api.github.com/users/${GITHUB_USER}`),
            getAllRepos(),
            fetchContribData(),
          ]);

          const starred = allRepos.filter(r => r.stargazers_count > 0)
            .sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0));
          const starredNames = new Set(starred.map(r => r.name));
          const latest = allRepos.filter(r => !starredNames.has(r.name))
            .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));
          const featured = [...starred, ...latest].slice(0, 6);
          const totalStars = allRepos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
          const publicRepos = user.public_repos;

          const langTotals = {}, langCounts = {};
          let grand = 0;
          for (const repo of allRepos) {
            const langs = await fetchJSON(repo.languages_url);
            if (!langs) continue;
            Object.entries(langs).forEach(([lang, bytes]) => {
              langTotals[lang] = (langTotals[lang] || 0) + bytes;
              langCounts[lang] = (langCounts[lang] || 0) + 1;
              grand += bytes;
            });
          }
          const langStats = Object.entries(langTotals)
            .sort((a, b) => b[1] - a[1]).slice(0, 6)
            .map(([name, bytes]) => ({ name, count: langCounts[name], pct: Math.round(bytes / grand * 100) }));

          const updated = new Date().toISOString().split('T')[0];
          const contribTotal = Object.values(contribData).reduce((s, n) => s + n, 0);
          console.log(`Updated: ${updated} | Stars: ${totalStars} | Repos: ${publicRepos} | Featured: ${featured.length} | Contribs: ${contribTotal}`);

          const fs = require('fs');
          let html = fs.readFileSync('index.html', 'utf8');

          // Update LANG_STATS
          html = html.replace(
            /const LANG_STATS = \[[\s\S]*?\];/,
            `const LANG_STATS = ${JSON.stringify(langStats, null, 4)};`
          );
          html = html.replace(
            /\/\/ Real language data[\s\S]*?\*\//,
            `// Real language data from GitHub API (updated ${updated})`
          );

          // Update PROJECTS array
          const projectsArr = featured.map(r => ({
            name: r.name,
            desc: r.description || `${r.name} — a ${r.language || 'code'} project by ${GITHUB_USER}`,
            lang: r.language || 'Code',
            stars: r.stargazers_count || 0,
            url: r.html_url,
          }));
          html = html.replace(
            /\/\/ Featured Projects data[\s\S]*?\];/,
            `// Featured Projects data from GitHub API (updated ${updated})\nconst PROJECTS = ${JSON.stringify(projectsArr, null, 4)};`
          );

          // Update REAL_CONTRIB_DATA
          const contribEntries = Object.entries(contribData)
            .sort(([a], [b]) => a.localeCompare(b))
            .map(([date, count]) => `      '${date}': ${count}`);
          const contribBlock = `const REAL_CONTRIB_DATA = {\n${contribEntries.join(',\n')}\n    };`;
          html = html.replace(
            /\/\/ Real contribution data[\s\S]*?const REAL_CONTRIB_DATA = \{[\s\S]*?\n    \};/,
            `// Real contribution data from github.com/users/${GITHUB_USER}/contributions (updated ${updated})\n// Total: ${contribTotal} contributions\n${contribBlock}`
          );

          // Update static stat cards: Total Stars and Repositories
          html = html.replace(
            /(id="stat-stars"[^>]*)>(\d+)</,
            (_, attrs, _old) => `${attrs}>${totalStars}<`
          );
          html = html.replace(
            /(id="stat-repos"[^>]*)>(\d+)</,
            (_, attrs, _old) => `${attrs}>${publicRepos}<`
          );

          fs.writeFileSync('index.html', html);
          console.log('index.html updated — LANG_STATS + PROJECTS + REAL_CONTRIB_DATA + stat-stars + stat-repos');
          console.log(`Stats: ${totalStars} stars, ${publicRepos} repos | Contribs: ${contribTotal} | Featured: ${featured.length} repos`);
        })();
        EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "ci: auto-update portfolio data $(date -u +%Y-%m-%d)"
          git push
